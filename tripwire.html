<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0a0a0a">
  <title>Tripwire Response &middot; Burn Log</title>
  <link rel="icon" type="image/svg+xml" href="icons/icon.svg">
  <style>
    :root {
      --bg: #0a0a0a;
      --panel: #141414;
      --border: #262626;
      --text: #e5e5e5;
      --muted: #a0a0a0;
      --dim: #737373;
      --accent: #a3e635;
      --green: #22c55e;
      --yellow: #eab308;
      --red: #ef4444;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: 'Helvetica Neue', -apple-system, BlinkMacSystemFont, Arial, sans-serif;
      padding: 20px;
      min-height: 100vh;
    }
    .wrap { max-width: 520px; margin: 0 auto; }
    h1 { color: var(--accent); font-size: 22px; margin: 0 0 4px; }
    .sub { color: var(--dim); font-size: 13px; margin: 0 0 20px; }
    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
      margin: 16px 0;
    }
    .card h2 { color: #d4d4d4; font-size: 15px; margin: 0 0 12px; }
    label {
      display: block;
      color: var(--muted);
      font-size: 13px;
      margin: 12px 0 6px;
    }
    input[type=number], input[type=text], textarea, select {
      width: 100%;
      background: #0a0a0a;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 15px;
      padding: 10px 12px;
      font-family: inherit;
    }
    input[type=number]:focus, input[type=text]:focus, textarea:focus, select:focus {
      outline: none;
      border-color: var(--accent);
    }
    textarea { min-height: 80px; resize: vertical; }
    button {
      display: block;
      width: 100%;
      background: var(--accent);
      color: #0a0a0a;
      font-size: 15px;
      font-weight: 600;
      border: 0;
      border-radius: 8px;
      padding: 14px;
      margin-top: 16px;
      cursor: pointer;
    }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .rating-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
      font-size: 14px;
    }
    .rating-row:last-child { border-bottom: 0; }
    .rating-row .label { color: #d4d4d4; }
    .rating-row .value { font-family: monospace; }
    .pill {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .pill.green { background: rgba(34,197,94,0.15); color: var(--green); }
    .pill.yellow { background: rgba(234,179,8,0.15); color: var(--yellow); }
    .pill.red { background: rgba(239,68,68,0.15); color: var(--red); }
    .note { color: var(--dim); font-size: 12px; margin-top: 8px; }
    .error {
      background: #1c0707;
      border: 1px solid var(--red);
      border-radius: 8px;
      padding: 14px;
      color: #fca5a5;
      font-size: 14px;
    }
    .success {
      background: #0f1a0f;
      border: 1px solid var(--green);
      border-radius: 8px;
      padding: 14px;
      color: #86efac;
      font-size: 14px;
    }
    .prior {
      background: #0f1a0f;
      border: 1px solid #264d26;
      border-radius: 8px;
      padding: 12px 14px;
      margin-bottom: 12px;
    }
    .prior .kicker {
      color: var(--muted);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin: 0 0 4px;
    }
    .prior p { color: #d4d4d4; font-size: 14px; margin: 0; line-height: 1.5; }
    footer { color: #404040; font-size: 11px; text-align: center; margin-top: 24px; }
  </style>
</head>
<body>
  <div class="wrap" id="root">
    <p class="sub">Loading…</p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/tripwire.js"></script>
</body>
</html>
